name: virtual_mentor_app
description: Virtual Mentor App - Clean Architecture + BLoC
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # DI
  get_it: ^7.6.7

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Responsive
  flutter_screenutil: ^5.9.0

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  pinput: ^5.0.0
  # Utils
  dartz: ^0.10.1
  intl: ^0.19.0
  image_picker: ^1.1.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
flutter_intl:
  enabled: true
flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
